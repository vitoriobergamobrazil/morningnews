name: Gerador do Briefing Matinal

on:
  schedule:
    - cron: '0 8 * * *' 
  workflow_dispatch: 

jobs:
  atualizar-dados:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v3

      - name: Preparar o Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar as ferramentas
        run: pip install -r requirements.txt

      - name: Rodar o Motor de Notícias (gerador.py)
        run: python gerador.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Salvar o novo Painel no GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Robo Executivo"
          git add dados.json
          git commit -m "Atualizando o painel com notícias do dia" || echo "Sem mudanças para salvar"
          git push
